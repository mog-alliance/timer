<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOG 集結着弾時刻計算</title>

<style>
body{
    font-family: 'Noto Sans JP', sans-serif;
    background:#202124;
    color:white;
    margin:0;
}

.container{
    max-width:450px;
    margin:24px auto;
    padding:16px;
    background:#2d2f33;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
    text-align: center;
    margin: 0 0 12px 0;
    font-size: 17px;
    font-weight: 300;
    white-space: nowrap;
}

.time{
    text-align:center;
    font-size:22px;
    margin:8px 0;
    font-weight:bold;
}

label{
    display:block;
    margin-top:12px;
    font-size:14px;
}

input{
    width:100%;
    padding:8px;
    font-size:16px;
    border-radius:8px;
    border:none;
    margin-top:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:25px;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#4285f4;
    color:white;
}

button:hover{
    background:#2f6fd8;
}

.result{
    margin-top:30px;
    text-align:center;
}

.result h2{
    font-size:16px;
    margin-bottom:5px;
}

#arrival{
    font-size:36px;
    font-weight:bold;
    color:#66ff99;
}

.small{
    margin-top:15px;
    color:#aaa;
    font-size:13px;
}
</style>

</head>

<body>

<div class="container">

<h1>MOG 集結着弾時刻計算</h1>

<div>
現在時刻
<div class="time" id="now"></div>
</div>

<label>集結時間（秒）</label>
<input id="march" type="number" value="300">

<label>バッファ（秒）</label>
<input id="buffer" type="number" value="60">

<label>最遅行軍時間（秒）</label>
<input id="latest" type="number" value="42">

<button onclick="calc()">計算</button>

<div class="result">

<h2>到着時刻</h2>

<div id="arrival">--:--:--</div>

<button onclick="copyTime()">時刻をコピー</button>

</div>

<div class="small">
現在時刻 + 行軍時間 + バッファ + 最遅行軍時間
</div>

</div>

<script>

function updateClock(){

    const now=new Date();

    document.getElementById("now").textContent=
        now.toLocaleTimeString('ja-JP',{
            hour12:false
        });

}

setInterval(updateClock,1000);

updateClock();

function calc(){

    const march=Number(document.getElementById("march").value)||0;
    const buffer=Number(document.getElementById("buffer").value)||0;
    const latest=Number(document.getElementById("latest").value)||0;

    const total=march+buffer+latest;

    const arrival=new Date(Date.now()+total*1000);

    const text=arrival.toLocaleTimeString('ja-JP',{
        hour12:false
    });

    document.getElementById("arrival").textContent=text;

}

function copyTime(){

    const text=document.getElementById("arrival").textContent;

    if(text=="--:--:--") return;

    navigator.clipboard.writeText(text);

    alert("コピーしました！");

}

</script>

</body>
</html>
